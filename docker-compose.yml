services:
  postgres:
    build: ./postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ghcr.io/amacneil/dbmate:latest
    environment:
      DATABASE_URL: "postgres://app:app@postgres:5432/app?sslmode=disable"
    volumes:
      - ./db:/db
    depends_on:
      postgres:
        condition: service_healthy
    command: up

  backend:
    build: ./backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: "postgresql://app:app@postgres:5432/app"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: ./backend
    command: python -m backend.worker
    environment:
      DATABASE_URL: "postgresql://app:app@postgres:5432/app"
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "3000:80"

volumes:
  postgres_data:
